<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CtrlS Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#013c66;--navy-dark:#012d4d;--blue:#2060c8;--blue-bg:#ecf3fd;--page-bg:#dce9f9;
  --green:#47c981;--green-bg:rgba(71,201,129,0.12);--green-bd:rgba(71,201,129,0.3);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,0.12);--amber-bd:rgba(245,158,11,0.3);
  --red:#e53e3e;--red-bg:rgba(229,62,62,0.10);--red-bd:rgba(229,62,62,0.28);
  --white:#fff;--surface:#fff;--border:#d0dff5;--border-2:#b8cfe8;
  --text:#0f2a45;--text-sub:#3a5a7a;--text-muted:#6b8aaa;
  --font:'Inter',system-ui,-apple-system,sans-serif;
}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
body{background:var(--page-bg);color:var(--text);font-family:var(--font);font-size:13px;line-height:1.5;min-height:100vh}

/* ── HEADER ── */
.hdr{background:var(--navy);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.hdr-left{display:flex;align-items:center;gap:12px}
.hdr-logo{display:flex;align-items:center;gap:8px}
.hdr-logo svg{width:28px;height:28px}
.hdr-div{width:1px;height:20px;background:rgba(255,255,255,0.2)}
.hdr-sub{font-size:12px;color:rgba(255,255,255,0.55)}
.hdr-right{display:flex;align-items:center;gap:14px}
.proj-wrap{position:relative}
.proj-sel{appearance:none;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:7px;color:#fff;font-size:13px;font-weight:600;font-family:var(--font);padding:6px 28px 6px 12px;cursor:pointer;outline:none}
.proj-sel:hover{background:rgba(255,255,255,0.18)}
.proj-sel option{background:#013c66;color:#fff}
.proj-arr{position:absolute;right:9px;top:50%;transform:translateY(-50%);pointer-events:none;color:rgba(255,255,255,0.7);font-size:10px}
.upd{font-size:11px;color:rgba(255,255,255,0.55);display:flex;align-items:center;gap:5px}
.live{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.state-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:calc(100vh - 52px);gap:12px;color:var(--text-muted)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MAIN ── */
.main{padding:20px 24px;max-width:1500px;margin:0 auto}

/* ── KPI STRIP ── */
.kpi-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:9px;padding:14px 16px;border-top:3px solid var(--navy)}
.kpi-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted);margin-bottom:6px}
.kpi-val{font-size:24px;font-weight:700;color:var(--text);line-height:1}
.kpi-sub{font-size:11px;color:var(--text-muted);margin-top:4px}

/* ── TOP BAND: pulse + status side by side ── */
.top-band{display:grid;grid-template-columns:280px 1fr;gap:12px;margin-bottom:18px}
.pulse-row{display:flex}
.pulse-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:16px 18px;width:100%;display:flex;flex-direction:column;justify-content:center;border-top:3px solid var(--navy)}
.pulse-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);margin-bottom:8px}
.pulse-main{display:flex;align-items:baseline;gap:10px}
.pulse-big{font-size:34px;font-weight:700;line-height:1}
.pulse-vs{font-size:13px;color:var(--text-muted);font-weight:500}
.pulse-sub{font-size:11px;color:var(--text-muted);margin-top:8px}

/* ── STATUS DISTRIBUTION ── */
.status-dist{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px 18px}
.sd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sd-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-sub)}
.sd-count{font-size:11px;color:var(--text-muted)}
.sd-bar{display:flex;height:26px;border-radius:6px;overflow:hidden;gap:2px}
.sd-seg{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;min-width:24px;transition:opacity .15s;cursor:default;overflow:visible}
.sd-seg:hover{opacity:0.85}
.sd-seg.high-risk{background:var(--red)}
.sd-seg.delayed{background:var(--amber)}
.sd-seg.medium-risk{background:#d97706}
.sd-seg.low-risk{background:#16a34a}
.sd-seg.on-track{background:var(--green)}
.sd-seg.completed{background:var(--blue)}
.sd-legend{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}
.sd-leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-sub)}
.sd-leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* ── PACKAGE ACCORDION (quick info) ── */
.pkg-acc{display:none;border-top:1px dashed var(--border);padding:14px 16px;background:#f9fbff}
.pkg-acc.open{display:block}
.pkg-acc-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.pkg-acc-col-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-sub);margin-bottom:8px}
/* vendor mini list */
.v-mini{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--white);border:1px solid var(--border);border-radius:6px;margin-bottom:6px}
.v-mini:last-child{margin-bottom:0}
.v-mini-name{font-size:11px;font-weight:600;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-right:8px}
.v-mini-stats{display:flex;align-items:center;gap:8px;flex-shrink:0}
.v-mini-pct{font-size:11px;font-weight:700}
.v-mini-pct.g{color:#1a7a4a}.v-mini-pct.a{color:#92600a}.v-mini-pct.r{color:var(--red)}
.v-mini-exp{font-size:10px;color:var(--text-muted)}
.v-mini-units{font-size:11px;font-weight:700;color:var(--text);min-width:70px;text-align:right}
/* critical lot mini */
.cl-mini{padding:8px 10px;background:var(--white);border:1px solid var(--border);border-left:3px solid transparent;border-radius:6px;margin-bottom:6px}
.cl-mini:last-child{margin-bottom:0}
.cl-mini.high-risk{border-left-color:#c2410c}
.cl-mini.delayed{border-left-color:var(--red)}
.cl-mini.medium-risk{border-left-color:var(--amber)}
.cl-mini.low-risk,.cl-mini.on-track{border-left-color:var(--green)}
.cl-mini-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:3px}
.cl-mini-name{font-size:11px;font-weight:700;color:var(--text);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cl-mini-vendor{font-size:10px;color:var(--text-muted);margin-bottom:5px}
.cl-mini-bot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.cl-mini-pct{font-size:12px;font-weight:700}
.cl-mini-pct.g{color:#1a7a4a}.cl-mini-pct.a{color:#92600a}.cl-mini-pct.r{color:var(--red)}
.cl-mini-units{font-size:11px;font-weight:700;color:var(--text)}
/* view detail button */
.acc-detail-btn{margin-top:14px;display:inline-flex;align-items:center;gap:6px;background:var(--navy);color:#fff;border:none;border-radius:7px;padding:8px 16px;font-size:12px;font-weight:600;font-family:var(--font);cursor:pointer;transition:background .15s}
.acc-detail-btn:hover{background:var(--blue)}

/* ── PACKAGE LIST ── */
.sec-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-sub);margin-bottom:10px}
.pkg-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}

/* package row — deliberately light */
.pkg-row{background:var(--white);border:1px solid var(--border);border-radius:9px;overflow:hidden;transition:border-color .15s,box-shadow .15s}
.pkg-row:hover{border-color:var(--blue);box-shadow:0 2px 10px rgba(32,96,200,0.1)}
.pkg-row.active{border-color:var(--blue);box-shadow:0 0 0 2px rgba(32,96,200,0.15)}
.pkg-head{display:grid;grid-template-columns:1.6fr 1fr 1fr 1.3fr 1.3fr 1.5fr 40px;align-items:center;cursor:pointer}

.pc{padding:12px 14px;border-right:1px solid var(--border)}
.pc:last-child{border-right:none}

/* name cell */
.pkg-name{font-size:13px;font-weight:700;color:var(--text)}
.pkg-meta{font-size:10px;color:var(--text-muted);margin-top:2px}

/* pct cells */
.pct-val{font-size:18px;font-weight:700;line-height:1;text-align:center}
.pct-val.g{color:#1a7a4a}.pct-val.a{color:#92600a}.pct-val.r{color:var(--red)}
.pct-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-top:3px;text-align:center}
.pct-exp{font-size:18px;font-weight:700;line-height:1;text-align:center;color:var(--text-sub)}

/* expand caret */
.pkg-caret{display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text-muted);transition:transform .2s}
.pkg-row.open .pkg-caret{transform:rotate(180deg);color:var(--blue)}

/* legacy progress (unused now) */
.prog-wrap{padding:10px 14px;border-right:1px solid var(--border)}

/* stat cells */
.stat-val{font-size:15px;font-weight:700;color:var(--text);text-align:center}
.stat-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-top:1px;text-align:center}
.stat-sub{font-size:10px;color:var(--text-muted);text-align:center;margin-top:1px}

/* date cells */
.dt-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:2px}
.dt-val{font-size:12px;font-weight:600;color:var(--text)}
.dt-val.late{color:var(--red)}
.dt-slip{font-size:10px;font-weight:600;margin-top:2px}
.dt-slip.l{color:var(--red)}.dt-slip.ok{color:var(--green)}

/* status badges */
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
.badge.high-risk{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.badge.medium-risk{background:var(--amber-bg);color:#92600a;border:1px solid var(--amber-bd)}
.badge.low-risk{background:var(--green-bg);color:#1a7a4a;border:1px solid var(--green-bd)}
.badge.on-track{background:var(--green-bg);color:#1a7a4a;border:1px solid var(--green-bd)}
.badge.delayed{background:var(--amber-bg);color:#92600a;border:1px solid var(--amber-bd)}
.badge.completed{background:rgba(32,96,200,0.1);color:var(--blue);border:1px solid rgba(32,96,200,0.25)}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(1,44,76,0.5);z-index:500;overflow:hidden}
.overlay.on{display:block}
.modal{position:absolute;inset:14px;background:var(--page-bg);border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.3);display:flex;flex-direction:column;overflow:hidden}
.modal-hdr{background:var(--navy);padding:13px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-hdr-l{display:flex;flex-direction:column}
.modal-ttl{color:#fff;font-size:14px;font-weight:700}
.modal-sub{color:rgba(255,255,255,0.55);font-size:11px;margin-top:1px}
.modal-hdr-r{display:flex;align-items:center;gap:6px}
.zm-btn{width:26px;height:26px;border-radius:6px;background:rgba(255,255,255,0.12);border:none;color:#fff;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;font-weight:600}
.zm-btn:hover{background:rgba(255,255,255,0.2)}
.zm-lbl{font-size:11px;color:rgba(255,255,255,0.6);min-width:32px;text-align:center}
.m-close{width:26px;height:26px;border-radius:6px;background:rgba(255,255,255,0.12);border:none;color:#fff;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;margin-left:6px}
.m-close:hover{background:rgba(220,50,50,0.4)}
.modal-scroll{overflow-y:auto;flex:1}
.modal-body{padding:18px}

/* ── CRITICAL STRIP ── */
.crit-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.crit-card{background:var(--white);border:1px solid var(--border);border-left:3px solid transparent;border-radius:8px;padding:11px 13px}
.crit-card.high-risk{border-left-color:var(--red)}
.crit-card.delayed{border-left-color:var(--amber)}
.crit-card.low-risk,.crit-card.on-track{border-left-color:var(--green)}
.crit-lot{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px}
.crit-vendor{font-size:10px;color:var(--text-muted);margin-bottom:8px}
.crit-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}
.crit-row .l{color:var(--text-muted)}.crit-row .v{font-weight:600;color:var(--text)}
.crit-row .v.r{color:var(--red)}.crit-row .v.a{color:var(--amber)}.crit-row .v.g{color:#1a7a4a}
.qty-bar-wrap{margin-top:7px}
.qty-bar-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--text-muted);margin-bottom:2px}
.qty-bar-t{height:4px;background:var(--blue-bg);border-radius:2px;overflow:hidden}
.qty-bar-f{height:100%;border-radius:2px}
.qty-bar-f.r{background:var(--red)}.qty-bar-f.a{background:var(--amber)}.qty-bar-f.g{background:var(--green)}
.crit-legend{font-size:10px;color:var(--text-muted);margin-bottom:12px;display:flex;align-items:center;gap:10px}
.crit-legend strong{color:var(--text-sub)}
.crit-legend span{display:flex;align-items:center;gap:4px}
.cl-dot{width:10px;height:3px;border-radius:2px;flex-shrink:0}

/* ── VENDOR TABS ── */
.v-tabs-wrap{background:var(--white);border:1px solid var(--border);border-radius:9px;overflow:hidden}
.v-tabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;background:#f4f8ff}
.v-tabs::-webkit-scrollbar{display:none}
.v-tab{padding:9px 16px;font-size:12px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--text-muted);white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;margin-bottom:-1px;transition:color .15s,border-color .15s}
.v-tab:hover{color:var(--text)}
.v-tab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.v-panel{display:none}.v-panel.on{display:block}
.v-body{padding:14px 16px}

/* vendor summary strip */
.v-sum{display:flex;gap:16px;font-size:11px;color:var(--text-muted);margin-bottom:12px;flex-wrap:wrap;align-items:center;padding-bottom:10px;border-bottom:1px solid var(--border)}
.v-sum strong{color:var(--text);font-weight:700}
.v-sum .sep{color:var(--border-2)}

/* issues row */
.issues-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.issue-chip{display:flex;align-items:flex-start;gap:5px;padding:5px 9px;border-radius:6px;font-size:11px;line-height:1.4}
.issue-chip.client{background:rgba(229,62,62,0.08);border:1px solid rgba(229,62,62,0.2);color:#b91c1c}
.issue-chip.vendor{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.25);color:#92600a}
.issue-chip .chip-lbl{font-weight:700;white-space:nowrap;font-size:10px;padding-top:1px}

/* PO header */
.po-hdr{display:flex;align-items:center;gap:10px;padding:7px 10px;background:var(--blue-bg);border-radius:6px;margin-bottom:8px;border:1px solid var(--border)}
.po-num{font-size:11px;font-weight:700;color:var(--navy)}
.po-desc{font-size:11px;color:var(--text-sub)}
.po-badge{margin-left:auto}
.po-section{margin-bottom:14px}

/* ── LOT TABLE — light ── */
.floor-tbl{width:100%;border-collapse:collapse}
.floor-tbl th{text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);padding:0 10px 7px;border-bottom:2px solid var(--border)}
.floor-tbl td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.floor-tbl tr:last-child td{border-bottom:none}
.floor-tbl tr.floor-row{cursor:pointer}
.floor-tbl tr.floor-row:hover td{background:var(--blue-bg)}
.floor-tbl tr.floor-row.expanded td{background:rgba(32,96,200,0.04);border-bottom:none}
.f-name{font-size:12px;font-weight:700;color:var(--text)}

/* inline bar */
.ibar{display:flex;align-items:center;gap:7px}
.ibar-t{flex:1;height:5px;background:var(--blue-bg);border-radius:3px;position:relative;min-width:60px}
.ibar-exp{position:absolute;top:-2px;height:9px;width:2px;background:rgba(32,96,200,0.4);border-radius:1px}
.ibar-f{height:100%;border-radius:3px}
.ibar-f.g{background:var(--green)}.ibar-f.a{background:var(--amber)}.ibar-f.r{background:var(--red)}
.ibar-pct{font-size:11px;font-weight:700;min-width:34px;text-align:right}
.ibar-pct.g{color:#1a7a4a}.ibar-pct.a{color:#92600a}.ibar-pct.r{color:var(--red)}

/* ── ACCORDION DRAWER ── */
.acc-row td{padding:0!important;border-bottom:1px solid var(--border)}
.acc-inner{padding:12px 10px 14px;background:#f9fbff;border-top:1px dashed var(--border)}
.acc-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.acc-item{background:var(--white);border:1px solid var(--border);border-radius:7px;padding:10px 12px}
.acc-item-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);margin-bottom:4px;font-weight:600}
.acc-item-val{font-size:13px;font-weight:700;color:var(--text)}
.acc-item-sub{font-size:10px;color:var(--text-muted);margin-top:2px}
.acc-item-val.r{color:var(--red)}.acc-item-val.a{color:#92600a}.acc-item-val.g{color:#1a7a4a}

/* milestone block */
.ms-block{background:var(--white);border:1px solid var(--border);border-radius:7px;padding:10px 12px;margin-bottom:10px}
.ms-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);font-weight:600;margin-bottom:4px}
.ms-val{font-size:11px;font-weight:600;color:var(--red)}.ms-val.ongoing{color:var(--text-sub)}

/* phases */
.phases-block{background:var(--white);border:1px solid var(--border);border-radius:7px;padding:10px 12px}
.phases-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-sub);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.phases-title::before{content:'';width:8px;height:8px;border-radius:2px;background:var(--blue);flex-shrink:0}
.phase-row{margin-bottom:8px}
.phase-row:last-child{margin-bottom:0}
.phase-name{font-size:11px;font-weight:600;color:var(--text);margin-bottom:3px;display:flex;justify-content:space-between;align-items:center}
.phase-pct{font-size:11px;font-weight:700;color:var(--navy)}
.phase-bar-t{height:6px;background:var(--blue-bg);border-radius:3px;overflow:hidden;margin-bottom:3px}
.phase-bar-f{height:100%;border-radius:3px;background:var(--blue);transition:width .4s}
.phase-comment{font-size:10px;color:var(--text-muted);font-style:italic}
.phase-delta{font-size:10px;color:var(--green);font-weight:600}

/* table legend */
.tbl-legend{display:flex;align-items:center;gap:12px;font-size:10px;color:var(--text-muted);margin-bottom:8px;flex-wrap:wrap}
.tbl-legend span{display:flex;align-items:center;gap:3px}
.tl-d{width:8px;height:8px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-left">
    <div class="hdr-logo">
      <svg viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="6" fill="rgba(255,255,255,0.12)"/>
        <path d="M8 10L16 22L24 10" stroke="#47c981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M12 10L16 17L20 10" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity=".6"/>
      </svg>

// ── HELPERS ──────────────────────────────────────────────────────────────
const MO=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fd(d){if(!d)return'—';const[dd,mm,yy]=d.split('-');return`${+dd} ${MO[+mm]} ${yy}`}
function dd(p,f){if(!p||!f)return null;const pa=s=>{const[d,m,y]=s.split('-');return new Date(y,m-1,d)};return Math.round((pa(f)-pa(p))/864e5)}
function sk(s){if(!s)return'';return s.toLowerCase().replace(/\s+/g,'-')}
function pc(a,e){if(a>=e)return'g';return(e-a)<=15?'a':'r'}

// ── PULSE (Units Delivered only) ──────────────────────────────────────────
function renderPulse(pkgs){
  const teq=pkgs.reduce((s,p)=>s+p.expected_qty_till_date,0);
  const taq=pkgs.reduce((s,p)=>s+p.actual_qty_till_date,0);
  const qShort=teq-taq;
  document.getElementById('pulse-row').innerHTML=`
    <div class="pulse-card">
      <div class="pulse-lbl">Units Delivered Till Date</div>
      <div class="pulse-main">
        <span class="pulse-big" style="color:${taq===0&&teq>0?'var(--red)':'var(--text)'}">${taq}</span>
        <span class="pulse-vs">/ ${teq} expected</span>
      </div>
      <div class="pulse-sub">${qShort>0?`<b style="color:var(--red)">${qShort} units</b> short of plan`:qShort===0&&teq>0?'On plan':'No deliveries expected yet'}</div>
    </div>`;
}

// ── LOT STATUS DISTRIBUTION ───────────────────────────────────────────────
function renderStatusDist(pkgs){
  const order=['Delayed','High Risk','Medium Risk','Low Risk','On Track','Completed'];
  const counts={};
  let total=0;
  pkgs.forEach(p=>p.vendors.forEach(v=>v.items.forEach(it=>{
    counts[it.status]=(counts[it.status]||0)+1; total++;
  })));
  const colorFor=s=>s==='Delayed'?'var(--red)':s==='High Risk'?'#c2410c':s==='Medium Risk'?'var(--amber)':s==='Low Risk'?'#16a34a':s==='On Track'?'var(--green)':'var(--blue)';
  const segs=order.filter(s=>counts[s]).map(s=>{
    const n=counts[s], pct=(n/total*100);
    return `<div class="sd-seg" style="width:${pct}%;background:${colorFor(s)}" title="${s}: ${n} lots">${n}</div>`;
  }).join('');
  const legend=order.filter(s=>counts[s]).map(s=>
    `<div class="sd-leg-item"><span class="sd-leg-dot" style="background:${colorFor(s)}"></span>${s}</div>`
  ).join('');
  document.getElementById('status-dist').innerHTML=`
    <div class="sd-top">
      <span class="sd-title">Lot Status Distribution</span>
      <span class="sd-count">${total} lots across ${pkgs.length} packages</span>
    </div>
    <div class="sd-bar">${segs}</div>
    <div class="sd-legend">${legend}</div>`;
}

    const c=pc(pkg.actual_pct,pkg.expected_pct);
    const dif=dd(pkg.planned_end_date,pkg.forecasted_end_date);
    const accId=`acc-pkg-${pi}`;
    return`<div class="pkg-row" id="pr-${pkg.package.replace(/\s/g,'_')}">
      <div class="pkg-head" onclick="togglePkgAcc('${accId}',this.closest('.pkg-row'))">

          <div class="pkg-name">${pkg.package}</div>
          <div class="pkg-meta">${pkg.total_vendors} vendor${pkg.total_vendors>1?'s':''} · PO ×${pkg.total_pos}</div>
          <div style="margin-top:5px"><span class="badge ${sk(pkg.status)}">${pkg.status}</span></div>
        </div>
        <div class="pc">
          <div class="pct-val ${c}">${pkg.actual_pct}%</div>
          <div class="pct-lbl">Actual</div>
        </div>
        <div class="pc">
          <div class="pct-exp">${pkg.expected_pct}%</div>
          <div class="pct-lbl">Expected</div>
        </div>
        <div class="pc" style="text-align:center">
          <div class="stat-val" style="color:${pkg.actual_qty_till_date===0&&pkg.expected_qty_till_date>0?'var(--red)':pkg.actual_qty_till_date>0?'#1a7a4a':'var(--text)'}">${pkg.actual_qty_till_date} <span style="font-size:11px;font-weight:400;color:var(--text-muted)">/ ${pkg.expected_qty_till_date}</span></div>
          <div class="stat-lbl">Units Delivered</div>
        </div>
        <div class="pc">
          <div class="dt-lbl">Planned End</div>
          <div class="dt-val">${fd(pkg.planned_end_date)}</div>
        </div>
        <div class="pc">
          <div class="dt-lbl">Forecast End</div>
          <div class="dt-val ${dif&&dif>30?'late':''}">${fd(pkg.forecasted_end_date)}</div>
          ${dif!==null?`<div class="dt-slip ${dif>0?'l':'ok'}">${dif>0?'▲ +'+dif+'d':dif<0?'▼ '+Math.abs(dif)+'d early':'On time'}</div>`:''}
        </div>
        <div class="pc pkg-caret">▼</div>
      </div>
      <div class="pkg-acc" id="${accId}">${buildPkgAccordion(pkg)}</div>
    </div>`;
  }).join('');
}

function buildPkgAccordion(pkg){
  // Vendor mini list — actual%, expected%, delivered units (no dates)
  const vendors=pkg.vendors.map(v=>{
    const vc=pc(v.actual_pct,v.expected_pct);
    return`<div class="v-mini">
      <span class="v-mini-name">${v.vendor_name}</span>
      <div class="v-mini-stats">
        <span class="v-mini-pct ${vc}">${v.actual_pct}%</span>
        <span class="v-mini-exp">/ ${v.expected_pct}% exp</span>
        <span class="v-mini-units">${v.actual_qty_till_date}/${v.expected_qty_till_date} <span style="color:var(--text-muted);font-weight:400">units</span></span>
      </div>
    </div>`;
  }).join('');

  // Critical lots (max 3) — vendor, actual%, status, units expected vs actual
  const crits=pkg.top_critical_items.slice(0,3).map(ci=>{
    const cc=pc(ci.actual_pct,ci.expected_pct);
    const eq=ci.expected_qty_till_date||0, aq=ci.actual_qty_till_date||0;
    return`<div class="cl-mini ${sk(ci.status)}">
      <div class="cl-mini-top">
        <span class="cl-mini-name">${ci.item_name}</span>
        <span class="badge ${sk(ci.status)}" style="font-size:9px;padding:1px 7px">${ci.status}</span>
      </div>
      <div class="cl-mini-vendor">${ci.vendor}</div>
      <div class="cl-mini-bot">
        <span class="cl-mini-pct ${cc}">${ci.actual_pct}% <span style="color:var(--text-muted);font-weight:400;font-size:10px">actual</span></span>
        <span class="cl-mini-units">${aq}/${eq} <span style="color:var(--text-muted);font-weight:400">units</span></span>
      </div>
    </div>`;
  }).join('');

  return`<div class="pkg-acc-cols">
    <div>
      <div class="pkg-acc-col-title">Vendors — Actual / Expected · Units Delivered</div>
      ${vendors}
    </div>
    <div>
      <div class="pkg-acc-col-title">Critical Lots</div>
      ${crits}
    </div>
  </div>
  <button class="acc-detail-btn" onclick="openModal('${pkg.package}')">View full detail →</button>`;
}

function togglePkgAcc(accId,row){
  const acc=document.getElementById(accId);
  const isOpen=acc.classList.contains('open');
  // close others
  document.querySelectorAll('.pkg-acc.open').forEach(a=>a.classList.remove('open'));
  document.querySelectorAll('.pkg-row.open').forEach(r=>r.classList.remove('open'));
  if(!isOpen){acc.classList.add('open');row.classList.add('open');}
}

// ── MODAL ────────────────────────────────────────────────────────────────
function openModal(pkgName){
  const pkgs=window._d.packages;
  const pkg=pkgs.find(p=>p.package===pkgName);
  if(!pkg)return;
  document.querySelectorAll('.pkg-row').forEach(r=>r.classList.remove('active'));
  const r=document.getElementById('pr-'+pkgName.replace(/\s/g,'_'));
  if(r)r.classList.add('active');
  document.getElementById('m-title').textContent=pkgName;
  document.getElementById('m-sub').textContent=`${pkg.total_vendors} Vendor${pkg.total_vendors>1?'s':''} · ${pkg.total_qty} Units · Forecast: ${fd(pkg.forecasted_end_date)}`;
  buildModal(pkg);
  document.getElementById('overlay').classList.add('on');
  document.body.style.overflow='hidden';
}

function buildModal(pkg){
  // ── Critical strip (always 3) ──
  const crits=pkg.top_critical_items.slice(0,3).map(ci=>{
    const dif=dd(ci.planned_end_date,ci.forecasted_end_date);
    const eq=ci.expected_qty_till_date||0, aq=ci.actual_qty_till_date||0;
    const qpct=eq>0?Math.min((aq/eq)*100,100):0;
    const qc=aq===0&&eq>0?'r':qpct>=100?'g':'a';
    return`<div class="crit-card ${sk(ci.status)}">
      <div class="crit-lot">${ci.item_name}</div>
      <div class="crit-vendor">${ci.vendor}</div>
      <div class="crit-row"><span class="l">Status</span><span class="v ${ci.status==='High Risk'?'r':ci.status==='Delayed'?'a':'g'}">${ci.status}</span></div>
      <div class="crit-row"><span class="l">Planned End</span><span class="v">${fd(ci.planned_end_date)}</span></div>
      <div class="crit-row"><span class="l">Forecast End</span><span class="v ${dif&&dif>0?'r':''}">${fd(ci.forecasted_end_date)}</span></div>
      ${dif!==null?`<div class="crit-row"><span class="l">Slip</span><span class="v ${dif>0?'r':dif<0?'g':''}">${dif>0?'+'+dif+'d late':dif<0?Math.abs(dif)+'d early':'On time'}</span></div>`:''}
      <div class="qty-bar-wrap">
        <div class="qty-bar-lbl"><span>Units delivered</span><span><b>${aq}</b> / ${eq} exp</span></div>
        <div class="qty-bar-t"><div class="qty-bar-f ${qc}" style="width:${qpct}%"></div></div>
      </div>
    </div>`;
  }).join('');

  // ── Vendor tabs ──
  const tabs=pkg.vendors.map((v,i)=>{
    const c=pc(v.actual_pct,v.expected_pct);
    const dot=c==='g'?'🟢':c==='a'?'🟡':'🔴';
    return`<button class="v-tab${i===0?' on':''}" onclick="switchVTab(this,'vp-${pkg.package.replace(/\s/g,'_')}-${i}')">${dot} ${v.vendor_name}</button>`;
  }).join('');

  const panels=pkg.vendors.map((v,i)=>{
    // issues chips
    const chips=[
      ...v.client_issues.map(x=>`<div class="issue-chip client"><span class="chip-lbl">CLIENT</span>${x}</div>`),
      ...v.vendor_issues.map(x=>`<div class="issue-chip vendor"><span class="chip-lbl">VENDOR</span>${x}</div>`)
    ].join('');

    // group by PO
    const byPO={};
    v.items.forEach(item=>{
      const k=item.po_number+'||'+item.po_desc;
      if(!byPO[k])byPO[k]=[];
      byPO[k].push(item);
    });

    const poSecs=Object.entries(byPO).map(([key,items])=>{
      const[poN,poD]=key.split('||');
      const ws=items.some(i=>i.status==='High Risk')?'High Risk':items.some(i=>i.status==='Delayed')?'Delayed':items.some(i=>i.status==='Medium Risk')?'Medium Risk':'On Track';
      const rows=items.map((item,ri)=>{
        const c2=pc(item.actual_pct,item.expected_pct);
        const d2=dd(item.planned_end_date,item.forecasted_end_date);
        const uid=`acc-${pkg.package.replace(/\s/g,'_')}-${i}-${ri}`;
        return`<tr class="floor-row" onclick="toggleAcc('${uid}',this)">
            <td><div class="f-name">${item.item_name}</div><div style="margin-top:3px"><span class="badge ${sk(item.status)}">${item.status}</span></div></td>
            <td><div class="ibar">
              <div class="ibar-t">
                <div class="ibar-exp" style="left:${Math.min(item.expected_pct,100)}%"></div>
                <div class="ibar-f ${c2}" style="width:${Math.min(item.actual_pct,100)}%"></div>
              </div>
              <span class="ibar-pct ${c2}">${item.actual_pct}%</span>
            </div></td>

            <td><div style="font-size:11px;font-weight:600;${d2&&d2>30?'color:var(--red)':''}">${fd(item.forecasted_end_date)}</div>${d2!==null?`<div class="dt-slip ${d2>0?'l':'ok'}" style="font-size:10px">${d2>0?'▲ +'+d2+'d':d2<0?'▼ '+Math.abs(d2)+'d':''}</div>`:''}</td>
          </tr>
          <tr class="acc-row" id="${uid}" style="display:none"><td colspan="4">${buildAccordion(item)}</td></tr>`;

        <div class="po-hdr"><span class="po-num">PO: ${poN}</span><span class="po-desc">${poD}</span><span class="po-badge"><span class="badge ${sk(ws)}">${ws}</span></span></div>

            <th>Forecast Date</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    }).join('');

    const dif=dd(v.planned_end_date,v.forecasted_end_date);
    return`<div class="v-panel${i===0?' on':''}" id="vp-${pkg.package.replace(/\s/g,'_')}-${i}">
      <div class="v-body">
        <div class="v-sum">
          <span><strong>${v.total_qty}</strong> units</span><span class="sep">·</span>
          <span>Expected <strong>${v.expected_pct}%</strong></span><span class="sep">·</span>
          <span>Actual <strong style="color:${pc(v.actual_pct,v.expected_pct)==='g'?'#1a7a4a':pc(v.actual_pct,v.expected_pct)==='a'?'#92600a':'var(--red)'}">${v.actual_pct}%</strong></span><span class="sep">·</span>
          <span>Delivered <strong>${v.actual_qty_till_date}</strong> / ${v.expected_qty_till_date} exp</span><span class="sep">·</span>
          <span>Forecast <strong style="color:${dif&&dif>30?'var(--red)':'var(--text)'}">${fd(v.forecasted_end_date)}</strong>${dif&&dif>0?` <span style="color:var(--red);font-size:10px">(+${dif}d)</span>`:''}</span>
        </div>
        ${chips?`<div class="issues-row">${chips}</div>`:''}
        ${poSecs}
      </div>
    </div>`;
  }).join('');

  document.getElementById('m-body').innerHTML=`
    <div class="crit-legend" style="margin-bottom:8px">
      <strong>Critical Lots:</strong>
      <span><span class="cl-dot" style="background:var(--red)"></span>High Risk</span>
      <span><span class="cl-dot" style="background:var(--amber)"></span>Delayed</span>
      <span><span class="cl-dot" style="background:var(--green)"></span>On Track / Low Risk</span>
      <span style="color:var(--text-muted);font-size:10px">Left border = lot status</span>
    </div>
    <div class="crit-bar">${crits}</div>
    <div class="v-tabs-wrap">
      <div class="v-tabs">${tabs}</div>
      ${panels}
    </div>`;
}

function buildAccordion(item){
  const d2=dd(item.planned_end_date,item.forecasted_end_date);
  const qpct=item.expected_qty_till_date>0?(item.actual_qty_till_date/item.expected_qty_till_date)*100:0;
  const qc=item.actual_qty_till_date===0&&item.expected_qty_till_date>0?'r':qpct>=100?'g':'a';

  // phases block
  let phasesHTML='';
  if(item.phases&&item.phases.length>0){
    const rows=item.phases.map(ph=>{
      const delta=ph.current_pct-ph.last_24h_pct;
      return`<div class="phase-row">
        <div class="phase-name">
          <span>${ph.phase}</span>
          <div style="display:flex;align-items:center;gap:6px">
            ${delta>0?`<span class="phase-delta">+${delta.toFixed(1)}% ↑</span>`:''}
            <span class="phase-pct">${ph.current_pct}%</span>
          </div>
        </div>
        <div class="phase-bar-t"><div class="phase-bar-f" style="width:${ph.current_pct}%"></div></div>
        ${ph.comment?`<div class="phase-comment">${ph.comment}</div>`:''}
      </div>`;
    }).join('');
    phasesHTML=`<div class="phases-block">
      <div class="phases-title">Phase Progress — Last 24hr Activity</div>
      ${rows}
    </div>`;
  }

  // milestone block
  const ms=item.most_delayed_milestone
    ?`<div class="ms-block"><div class="ms-lbl">Most Delayed Milestone</div><div class="ms-val">⚠ ${item.most_delayed_milestone}</div></div>`
    :item.ongoing_milestone
      ?`<div class="ms-block"><div class="ms-lbl">Ongoing Milestone</div><div class="ms-val ongoing">${item.ongoing_milestone.split(',')[0].trim()}</div></div>`
      :'';

  return`<div class="acc-inner">
    <div class="acc-grid">
      <div class="acc-item">
        <div class="acc-item-lbl">Total Units</div>
        <div class="acc-item-val">${item.total_qty}</div>
      </div>
      <div class="acc-item">
        <div class="acc-item-lbl">Units Delivered / Expected</div>
        <div class="acc-item-val ${qc}">${item.actual_qty_till_date} <span style="font-size:11px;font-weight:400;color:var(--text-muted)">/ ${item.expected_qty_till_date}</span></div>
        <div class="acc-item-sub" style="margin-top:4px">
          <div style="height:4px;background:var(--blue-bg);border-radius:2px;overflow:hidden">
            <div style="height:100%;background:${qc==='g'?'var(--green)':qc==='a'?'var(--amber)':'var(--red)'};width:${Math.min(qpct,100)}%;border-radius:2px"></div>
          </div>
        </div>
      </div>
      <div class="acc-item">
        <div class="acc-item-lbl">Forecast vs Plan</div>
        <div class="acc-item-val ${d2&&d2>30?'r':''}">${fd(item.forecasted_end_date)}</div>
        <div class="acc-item-sub">${d2!==null?(d2>0?`+${d2}d slip`:d2<0?`${Math.abs(d2)}d early`:'On time'):'—'}</div>
      </div>
    </div>
    ${ms}
    ${phasesHTML}
  </div>`;
}

function toggleAcc(uid,row){
  const acc=document.getElementById(uid);
  const isOpen=acc.style.display!=='none';
  acc.style.display=isOpen?'none':'table-row';
  row.classList.toggle('expanded',!isOpen);
}
function switchVTab(btn,panelId){
  const wrap=btn.closest('.v-tabs-wrap');
  wrap.querySelectorAll('.v-tab').forEach(t=>t.classList.remove('on'));
  wrap.querySelectorAll('.v-panel').forEach(p=>p.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById(panelId).classList.add('on');
}

// zoom
let zl=100;
function zoom(dir){
  zl=Math.min(150,Math.max(60,zl+dir*10));
  document.getElementById('m-body').style.zoom=zl+'%';
  document.getElementById('zm-lbl').textContent=zl+'%';
}
document.getElementById('m-close').addEventListener('click',()=>{
  document.getElementById('overlay').classList.remove('on');
  document.body.style.overflow='';
  document.querySelectorAll('.pkg-row').forEach(r=>r.classList.remove('active'));
  zl=100;document.getElementById('m-body').style.zoom='100%';document.getElementById('zm-lbl').textContent='100%';
});
document.getElementById('overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('overlay'))document.getElementById('m-close').click();
});

// project switcher & loader
window._allP=ALL_PROJECTS;
function loadProject(name){
  const entry=window._allP[name];
  if(!entry)return;
  window._d=entry.data;
  if(entry.last_updated){
    const d=new Date(entry.last_updated);
    document.getElementById('upd-txt').textContent=`Updated ${d.getDate()} ${MO[d.getMonth()+1]} ${d.getFullYear()}`;
  }
  renderPulse(entry.data.packages);
  renderStatusDist(entry.data.packages);
  renderPackages(entry.data.packages);
  document.getElementById('overlay').classList.remove('on');
  document.body.style.overflow='';
}
function switchProject(n){loadProject(n)}

async function init(){
  try{
    const names=Object.keys(ALL_PROJECTS);
    const sel=document.getElementById('proj-sel');
    sel.innerHTML=names.map(n=>`<option value="${n}">${n}</option>`).join('');
    loadProject(names[0]);
    document.getElementById('loading').style.display='none';
    document.getElementById('main').style.display='block';
  }catch(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('error-state').style.display='flex';
    document.getElementById('err-msg').textContent=`Error: ${e.message}`;
  }
}
init();
</script>
</body>
</html>
